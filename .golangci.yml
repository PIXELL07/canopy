run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - bodyclose

linters-settings:
  errcheck:
    check-type-assertions: false
  govet:
    enable-all: false

issues:
  exclude-rules:
    - source: "defer.*\\.Close"
      linters: [errcheck]
    - source: "defer.*\\.Sync"
      linters: [errcheck]
    - path: "_test\\.go"
      linters: [errcheck]
  exclude:
    - "could not import"
    - "could not load export data"