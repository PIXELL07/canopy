version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: canopy-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: canopy
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: canopy-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  canopy:
    build: .
    container_name: canopy-server
    ports:
      - "8080:8080"
    environment:
      PORT: ":8080"
      MONGO_URI: "mongodb://mongo:27017"
      DB_NAME: "canopy"
      REDIS_ADDR: "redis:6379"
      JWT_SECRET: "dev-jwt-secret-change-in-production-32+"
      APP_ENV: "development"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
